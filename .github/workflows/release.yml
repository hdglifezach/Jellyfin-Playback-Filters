name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Publish
        run: dotnet publish .\Jellyfin.Plugin.PlaybackFilters\Jellyfin.Plugin.PlaybackFilters.csproj -c Release -o .\publish
      - name: Package
        shell: pwsh
        run: |
          Copy-Item .\meta.json .\publish\meta.json -Force
          Compress-Archive -Path .\publish\Jellyfin.Plugin.PlaybackFilters.dll,.\publish\meta.json -DestinationPath .\Jellyfin.Plugin.PlaybackFilters_10.11.zip -Force
      - uses: softprops/action-gh-release@v2
        with:
          files: Jellyfin.Plugin.PlaybackFilters_10.11.zip
          generate_release_notes: true
